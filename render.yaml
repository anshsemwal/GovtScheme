services:
  - type: web
    name: govt-scheme-app
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.2
      - key: HOST
        value: 0.0.0.0
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: HUGGINGFACE_API_KEY
        sync: false
